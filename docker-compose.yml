    networks: [internal]

  discord-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.DiscordBff/CasinoShiz.DiscordBff.csproj
