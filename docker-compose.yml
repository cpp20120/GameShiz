      Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
