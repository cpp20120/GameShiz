    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "4004:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD} 
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_LOG_LEVEL: warn  
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - internal

  db-backup:
    profiles: ["monolith"]
    image: postgres:16-alpine
    restart: "no"  
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backup  
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    command: sh -c "pg_dump -h postgres -U cazino -d cazino -f /backup/cazino_$$(date +%Y%m%d_%H%M%S).sql"

  db-backup-microservices:
    profiles: ["microservices", "distributed"]
    image: postgres:16-alpine
    environment:
      BACKEND_PGPASSWORD: ${POSTGRES_PASSWORD}
      IDENTITY_PGPASSWORD: ${POSTGRES_PASSWORD}
      WALLET_PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backup
    depends_on:
      backend-postgres:
        condition: service_healthy
      identity-postgres:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
    networks:
      - internal
    command: >-
      sh -c "PGPASSWORD=$$BACKEND_PGPASSWORD pg_dump -h backend-postgres -U backend -d backend
      -f /backup/backend_$$(date +%Y%m%d_%H%M%S).sql &&
      PGPASSWORD=$$IDENTITY_PGPASSWORD pg_dump -h identity-postgres -U identity -d identity
      -f /backup/identity_$$(date +%Y%m%d_%H%M%S).sql &&
      PGPASSWORD=$$WALLET_PGPASSWORD pg_dump -h wallet-postgres -U wallet -d wallet
      -f /backup/wallet_$$(date +%Y%m%d_%H%M%S).sql"

networks:
  internal:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  backend_postgres_data:
  identity_postgres_data:
  wallet_postgres_data:
  clickhouse_data:
  redis_data:
  bot_app_data:
  grafana_data:
  prometheus_data:
  dotnet_monitor_diag:
  minio_data:
  tempo_data:
  alertmanager_data:
