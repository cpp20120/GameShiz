      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Bot__Enabled: "true"
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      TelegramOutbox__Transport: "Cap"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
