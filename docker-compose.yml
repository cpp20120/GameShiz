    environment:
      <<: *game-backend-environment
      Backend__Modules: "dice"
      Backend__ServiceName: "game-dice"

  game-dicecube:
    <<: *game-backend-common
    environment:
      <<: *game-backend-environment
      Backend__Modules: "dicecube"
      Backend__ServiceName: "game-dicecube"

