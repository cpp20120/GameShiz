x-game-backend-environment: &game-backend-environment
  ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
  Backend__ServiceName: "game"
  Redis__Enabled: "true"
  Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
  TelegramOutbox__Transport: "Cap"
  ClickHouse__Enabled: "false"
  Bot__Enabled: "false"
  Services__Identity__Mode: "Grpc"
  Services__Identity__Address: "http://identity:8081"
  Services__Wallet__Mode: "Grpc"
  Services__Wallet__Address: "http://wallet:8081"
  Services__Operations__ApiKey: "${OPERATIONS_API_KEY}"
  Rendering__Minio__Enabled: "true"
  Rendering__Minio__Endpoint: "minio:9000"
  Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
  Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

x-game-backend-common: &game-backend-common
  profiles: ["distributed"]
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PROJECT: host/CasinoShiz.Backend/CasinoShiz.Backend.csproj
      APP_DLL: CasinoShiz.Backend.dll
  env_file: [.env]
  environment:
    <<: *game-backend-environment
  depends_on:
    backend-postgres: { condition: service_healthy }
    identity: { condition: service_healthy }
    wallet: { condition: service_healthy }
    redis: { condition: service_healthy }
    minio: { condition: service_healthy }
  healthcheck:
    test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/ready"]
    interval: 5s
    timeout: 3s
    retries: 30
    start_period: 20s
  restart: unless-stopped
  networks: [internal]

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cazino
      POSTGRES_USER: cazino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cazino -d cazino"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend-postgres:
    profiles: ["microservices", "distributed"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  identity-postgres:
    profiles: ["microservices", "distributed"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  wallet-postgres:
    profiles: ["microservices", "distributed"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - wallet_postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: cazinoshiz
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD} 
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password='${CLICKHOUSE_PASSWORD}' --query 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - internal

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://cazino:${POSTGRES_PASSWORD}@postgres:5432/cazino?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  backend-postgres-exporter:
    profiles: ["microservices", "distributed"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://backend:${POSTGRES_PASSWORD}@backend-postgres:5432/backend?sslmode=disable"
    depends_on:
      backend-postgres:
        condition: service_healthy
    networks: [internal]

  identity-postgres-exporter:
    profiles: ["microservices", "distributed"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://identity:${POSTGRES_PASSWORD}@identity-postgres:5432/identity?sslmode=disable"
    depends_on:
      identity-postgres:
        condition: service_healthy
    networks: [internal]

  wallet-postgres-exporter:
    profiles: ["microservices", "distributed"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://wallet:${POSTGRES_PASSWORD}@wallet-postgres:5432/wallet?sslmode=disable"
    depends_on:
      wallet-postgres:
        condition: service_healthy
    networks: [internal]

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  cadvisor:
    image: ghcr.io/google/cadvisor:0.55.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9080:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.listen-address=:9090
    depends_on:
      - postgres-exporter
      - redis-exporter
      - cadvisor
      - dotnet-monitor
      - otel-collector
      - alertmanager
    networks:
      - internal

  dotnet-monitor:
    image: mcr.microsoft.com/dotnet/monitor:10
    user: root
    restart: unless-stopped
    command:
      - collect
      - --no-auth
      - --urls
      - http://+:52323
      - --metricUrls
      - http://+:52325
      - --diagnostic-port
      - /diag/dotnet-monitor.sock
    volumes:
      - dotnet_monitor_diag:/diag
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.136.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    networks: [internal]

  tempo:
    image: grafana/tempo:2.8.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
    networks: [internal]

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yaml", "--storage.path=/alertmanager"]
    volumes:
      - ./observability/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks: [internal]

  cazino-bot:
    profiles: ["monolith"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.Host/CasinoShiz.Host.csproj
        APP_DLL: CasinoShiz.Host.dll
    ports:
      - "${BOT_HTTP_PORT:-4000}:8080"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    env_file:
      - .env
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      ClickHouse__ConnectionString: "clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      DOTNET_DiagnosticPorts: "/diag/dotnet-monitor.sock,nosuspend"
    volumes:
      - bot_app_data:/app/data
      - dotnet_monitor_diag:/diag
    depends_on:
      dotnet-monitor:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  backend:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.Backend/CasinoShiz.Backend.csproj
        APP_DLL: CasinoShiz.Backend.dll
    env_file: [.env]
    environment:
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "backend"
      TelegramOutbox__Transport: "Cap"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
      Services__Identity__Mode: "Grpc"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Mode: "Grpc"
      Services__Wallet__Address: "http://wallet:8081"
      Services__Operations__ApiKey: "${OPERATIONS_API_KEY}"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports: ["${BACKEND_HTTP_PORT:-5081}:8080"]
    depends_on:
      backend-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  identity:
    profiles: ["microservices", "distributed"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: services/CasinoShiz.IdentityService/CasinoShiz.IdentityService.csproj
        APP_DLL: CasinoShiz.IdentityService.dll
    environment:
      ConnectionStrings__Postgres: "Host=identity-postgres;Port=5432;Database=identity;Username=identity;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "false"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "identity"
    ports: ["${IDENTITY_HTTP_PORT:-5082}:8080"]
    depends_on:
      identity-postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  wallet:
    profiles: ["microservices", "distributed"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: services/CasinoShiz.WalletService/CasinoShiz.WalletService.csproj
        APP_DLL: CasinoShiz.WalletService.dll
    environment:
      ConnectionStrings__Postgres: "Host=wallet-postgres;Port=5432;Database=wallet;Username=wallet;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "false"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "wallet"
    ports: ["${WALLET_HTTP_PORT:-5083}:8080"]
    depends_on:
      wallet-postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  telegram-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.TelegramBff/CasinoShiz.TelegramBff.csproj
        APP_DLL: CasinoShiz.TelegramBff.dll
    env_file: [.env]
    environment:
      Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Bot__Enabled: "true"
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "telegram-bff"
      TelegramOutbox__Transport: "Cap"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports: ["${TELEGRAM_BFF_HTTP_PORT:-5084}:8080"]
    extra_hosts: ["api.telegram.org:149.154.167.220"]
    depends_on:
      backend: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
      backend-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  discord-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.DiscordBff/CasinoShiz.DiscordBff.csproj
        APP_DLL: CasinoShiz.DiscordBff.dll
    env_file: [.env]
    environment:
      Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "discord-bff"
      Discord__Enabled: "${Discord__Enabled:-false}"
      Discord__Token: "${Discord__Token:-}"
      Discord__CommandPrefix: "!"
    ports: ["${DISCORD_BFF_HTTP_PORT:-5086}:8080"]
    depends_on:
      backend: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
      backend-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  admin-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.AdminBff/CasinoShiz.AdminBff.csproj
        APP_DLL: CasinoShiz.AdminBff.dll
    environment:
      Services__Backend__Address: "http://backend:8080"
      Services__Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Services__Operations__ApiKey: "${OPERATIONS_API_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "admin-bff"
      Admin__SuperAdminToken: "${ADMIN_SUPERADMIN_TOKEN}"
      Admin__ReadOnlyToken: "${ADMIN_READONLY_TOKEN:-}"
      Admin__ActorId: "${ADMIN_ACTOR_ID:-1}"
      Admin__DisplayName: "${ADMIN_DISPLAY_NAME:-Admin}"
    ports: ["${ADMIN_BFF_HTTP_PORT:-5085}:8080"]
    depends_on:
      backend: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  rest-api:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.Api/CasinoShiz.Api.csproj
        APP_DLL: CasinoShiz.Api.dll
    env_file: [.env]
    environment:
      Backend__GrpcAddress: "http://backend:8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "rest-api"
      RateLimit__Enabled: "false"
      Rest__ExposeOpenApiOutsideDevelopment: "true"
      Rest__Jwt__Authority: "${REST_JWT_AUTHORITY:-}"
      Rest__Jwt__Audience: "${REST_JWT_AUDIENCE:-casinoshiz-api}"
      Rest__Jwt__RequireHttpsMetadata: "${REST_JWT_REQUIRE_HTTPS_METADATA:-true}"
    ports: ["127.0.0.1:${REST_API_HTTP_PORT:-5090}:8080"]
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  nginx:
    profiles: ["microservices"]
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/rest-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      rest-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks: [internal]

  telegram-bff-distributed:
    profiles: ["distributed"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.TelegramBff/CasinoShiz.TelegramBff.csproj
        APP_DLL: CasinoShiz.TelegramBff.dll
    env_file: [.env]
    environment:
      Backend__GrpcAddress: "http://game-admin:8081"
      Backend__GameAddresses__Dice: "http://game-dice:8081"
      Backend__GameAddresses__DiceCube: "http://game-dicecube:8081"
      Backend__GameAddresses__Darts: "http://game-darts:8081"
      Backend__GameAddresses__Football: "http://game-football:8081"
      Backend__GameAddresses__Basketball: "http://game-basketball:8081"
      Backend__GameAddresses__Bowling: "http://game-bowling:8081"
      Backend__GameAddresses__Transfer: "http://game-transfer:8081"
      Backend__GameAddresses__Redeem: "http://game-redeem:8081"
      Backend__GameAddresses__Leaderboard: "http://game-leaderboard:8081"
      Backend__GameAddresses__PixelBattle: "http://game-pixelbattle:8081"
      Backend__GameAddresses__Pick: "http://game-pick:8081"
      Backend__GameAddresses__Blackjack: "http://game-blackjack:8081"
      Backend__GameAddresses__Horse: "http://game-horse:8081"
      Backend__GameAddresses__Challenges: "http://game-challenges:8081"
      Backend__GameAddresses__Poker: "http://game-poker:8081"
      Backend__GameAddresses__SecretHitler: "http://game-secrethitler:8081"
      Backend__GameAddresses__Meta: "http://game-meta:8081"
      Backend__GameAddresses__Admin: "http://game-admin:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Bot__Enabled: "true"
      ConnectionStrings__Postgres: "Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
