services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cazino
      POSTGRES_USER: cazino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cazino -d cazino"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: cazinoshiz
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD} 
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password='${CLICKHOUSE_PASSWORD}' --query 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - internal

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://cazino:${POSTGRES_PASSWORD}@postgres:5432/cazino?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9080:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.listen-address=:9090
    depends_on:
      - postgres-exporter
      - redis-exporter
      - cadvisor
      - dotnet-monitor
    networks:
      - internal

  dotnet-monitor:
    image: mcr.microsoft.com/dotnet/monitor:10
    user: root
    restart: unless-stopped
    command:
      - collect
      - --no-auth
      - --urls
      - http://+:52323
      - --metricUrls
      - http://+:52325
      - --diagnostic-port
      - /diag/dotnet-monitor.sock
    volumes:
      - dotnet_monitor_diag:/diag
    networks:
      - internal

  cazino-bot:
    profiles: ["monolith"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.Host/CasinoShiz.Host.csproj
        APP_DLL: CasinoShiz.Host.dll
    ports:
      - "4000:8080"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    env_file:
      - .env
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      ClickHouse__ConnectionString: "clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      DOTNET_DiagnosticPorts: "/diag/dotnet-monitor.sock,nosuspend"
    volumes:
      - bot_app_data:/app/data
      - dotnet_monitor_diag:/diag
    depends_on:
      dotnet-monitor:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  backend:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.Backend/CasinoShiz.Backend.csproj
        APP_DLL: CasinoShiz.Backend.dll
    env_file: [.env]
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      TelegramOutbox__Transport: "Cap"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
      Services__Identity__Mode: "Grpc"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Mode: "Grpc"
      Services__Wallet__Address: "http://wallet:8081"
      Services__Operations__ApiKey: "${OPERATIONS_API_KEY}"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports: ["5081:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  identity:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: services/CasinoShiz.IdentityService/CasinoShiz.IdentityService.csproj
        APP_DLL: CasinoShiz.IdentityService.dll
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "false"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
    ports: ["5082:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  wallet:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: services/CasinoShiz.WalletService/CasinoShiz.WalletService.csproj
        APP_DLL: CasinoShiz.WalletService.dll
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__Enabled: "false"
      ClickHouse__Enabled: "false"
      Bot__Enabled: "false"
    ports: ["5083:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  telegram-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.TelegramBff/CasinoShiz.TelegramBff.csproj
        APP_DLL: CasinoShiz.TelegramBff.dll
    env_file: [.env]
    environment:
      Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Bot__Enabled: "true"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cazino;Username=cazino;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      TelegramOutbox__Transport: "Cap"
      Rendering__Minio__Enabled: "true"
      Rendering__Minio__Endpoint: "minio:9000"
      Rendering__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Rendering__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports: ["5084:8080"]
    extra_hosts: ["api.telegram.org:149.154.167.220"]
    depends_on:
      backend: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  admin-bff:
    profiles: ["microservices"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: host/CasinoShiz.AdminBff/CasinoShiz.AdminBff.csproj
        APP_DLL: CasinoShiz.AdminBff.dll
    environment:
      Services__Backend__Address: "http://backend:8080"
      Services__Backend__GrpcAddress: "http://backend:8081"
      Services__Identity__Address: "http://identity:8081"
      Services__Wallet__Address: "http://wallet:8081"
      Services__Operations__ApiKey: "${OPERATIONS_API_KEY}"
      Admin__SuperAdminToken: "${ADMIN_SUPERADMIN_TOKEN}"
      Admin__ReadOnlyToken: "${ADMIN_READONLY_TOKEN:-}"
      Admin__ActorId: "${ADMIN_ACTOR_ID:-1}"
      Admin__DisplayName: "${ADMIN_DISPLAY_NAME:-Admin}"
    ports: ["5085:8080"]
    depends_on:
      backend: { condition: service_healthy }
      identity: { condition: service_healthy }
      wallet: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "4004:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD} 
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_LOG_LEVEL: warn  
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - internal

  db-backup:
    image: postgres:16-alpine
    restart: "no"  
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backup  
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    command: sh -c "pg_dump -h postgres -U cazino -d cazino -f /backup/cazino_$$(date +%Y%m%d_%H%M%S).sql"

networks:
  internal:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  bot_app_data:
  grafana_data:
  prometheus_data:
  dotnet_monitor_diag:
  minio_data:
