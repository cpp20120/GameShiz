      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
