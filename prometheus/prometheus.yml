# Scrape config for local docker-compose. Prometheus scrapes the exporters; Grafana
# queries Prometheus (not the exporters directly).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics

  - job_name: dotnet
    scrape_interval: 15s
    static_configs:
      - targets: ["dotnet-monitor:52325"]
        labels:
          service: cazino-bot
    metrics_path: /metrics
