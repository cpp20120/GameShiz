syntax = "proto3";
option csharp_namespace = "Games.Redeem.Transport.Grpc.Wire";
package casinoshiz.redeem.v1;
message ContractCall { string payload_json = 1; }
message ContractReply { string payload_json = 1; }
service RedeemApi {
  rpc Issue (ContractCall) returns (ContractReply);
  rpc Begin (ContractCall) returns (ContractReply);
  rpc VerifyCaptcha (ContractCall) returns (ContractReply);
  rpc Complete (ContractCall) returns (ContractReply);
}
