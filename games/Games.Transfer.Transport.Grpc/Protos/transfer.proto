syntax = "proto3";
option csharp_namespace = "Games.Transfer.Transport.Grpc.Wire";
package casinoshiz.transfer.v1;

message TransferRequest {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  int64 chat_id = 3;
  string sender_display_name = 4;
  string recipient_display_name = 5;
  int32 net_to_recipient = 6;
  int32 source_message_id = 7;
}

message TransferResponse {
  int32 error = 1;
  int32 net_to_recipient = 2;
  int32 fee_coins = 3;
  int32 total_debited = 4;
  int32 sender_balance = 5;
  int32 recipient_balance = 6;
}

service TransferApi { rpc TryTransfer (TransferRequest) returns (TransferResponse); }
