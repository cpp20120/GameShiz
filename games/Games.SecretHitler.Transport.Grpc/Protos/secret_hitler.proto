syntax = "proto3";
option csharp_namespace = "Games.SecretHitler.Transport.Grpc.Wire";
package casinoshiz.secret_hitler.v1;
message ContractCall { string payload_json = 1; }
message ContractReply { string payload_json = 1; }
service SecretHitlerApi {
  rpc FindMyGame(ContractCall) returns (ContractReply);
  rpc CreateGame(ContractCall) returns (ContractReply);
  rpc JoinGame(ContractCall) returns (ContractReply);
  rpc StartGame(ContractCall) returns (ContractReply);
  rpc Nominate(ContractCall) returns (ContractReply);
  rpc Vote(ContractCall) returns (ContractReply);
  rpc PresidentDiscard(ContractCall) returns (ContractReply);
  rpc ChancellorEnact(ContractCall) returns (ContractReply);
  rpc Leave(ContractCall) returns (ContractReply);
  rpc SetStateMessage(ContractCall) returns (ContractReply);
  rpc SetPublicStateMessage(ContractCall) returns (ContractReply);
}
