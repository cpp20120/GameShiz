syntax = "proto3";
option csharp_namespace = "Games.Leaderboard.Transport.Grpc.Wire";
package casinoshiz.leaderboard.v1;
message ContractCall { string payload_json = 1; }
message ContractReply { string payload_json = 1; }
service LeaderboardApi {
  rpc GetTop (ContractCall) returns (ContractReply);
  rpc GetBalance (ContractCall) returns (ContractReply);
  rpc GetGlobalTop (ContractCall) returns (ContractReply);
  rpc GetTopByChat (ContractCall) returns (ContractReply);
  rpc ClaimDaily (ContractCall) returns (ContractReply);
}
