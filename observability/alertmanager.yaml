global:
  resolve_timeout: 5m

route:
  receiver: generic-webhook
  group_by: [alertname, service, channel]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: generic-webhook
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alerts}'
        send_resolved: true

# Telegram and Slack can be added as ordinary receivers. Keeping the default
# receiver generic makes this deployment safe for third-party installations.
