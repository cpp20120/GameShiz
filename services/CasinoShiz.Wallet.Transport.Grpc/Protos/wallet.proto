syntax = "proto3";
option csharp_namespace = "CasinoShiz.Wallet.Transport.Grpc.Wire";
package casinoshiz.wallet.v1;
message WalletCall { string contract = 1; string method = 2; string arguments_json = 3; }
message WalletReply { string result_json = 1; }
service WalletApi { rpc Invoke(WalletCall) returns (WalletReply); }
