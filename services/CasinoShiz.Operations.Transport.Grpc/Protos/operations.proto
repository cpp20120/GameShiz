syntax = "proto3";
option csharp_namespace = "CasinoShiz.Operations.Transport.Grpc.Wire";
package casinoshiz.operations.v1;
service OperationsApi { rpc Invoke(OperationsCall) returns (OperationsReply); }
message OperationsCall { string method = 1; string arguments_json = 2; }
message OperationsReply { string result_json = 1; }
