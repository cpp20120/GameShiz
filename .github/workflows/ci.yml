name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
      - feature/**
      - meta-**

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply queued issue 76 patch
        if: github.event_name == 'push' && hashFiles('.github/issue76.patch') != ''
        shell: bash
        run: |
          git apply --index .github/issue76.patch
          git rm .github/issue76.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: split service databases and add read aggregation"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Publish source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build --no-restore --configuration Release 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dotnet test --no-build --configuration Release --verbosity normal 2>&1 | tee test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 1
