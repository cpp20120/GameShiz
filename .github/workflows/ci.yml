name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
      - feature/**
      - meta-**

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply queued Discord parity payload
        if: github.event_name == 'push' && hashFiles('.github/discord-parity.tar.gz.b64') != ''
        shell: bash
        run: |
          base64 --decode .github/discord-parity.tar.gz.b64 > /tmp/discord-parity.tar.gz
          tar -xzf /tmp/discord-parity.tar.gz
          git rm .github/discord-parity.tar.gz.b64
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: add Discord game BFF adapters"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Validate microservices Compose topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          CLICKHOUSE_PASSWORD: ci-clickhouse-password
          GRAFANA_ADMIN_PASSWORD: ci-grafana-password
        run: |
          cp .env.example .env
          docker compose --profile microservices config --quiet

      - name: Publish source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build --no-restore --configuration Release 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dotnet test --no-build --configuration Release --verbosity normal 2>&1 | tee test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 1
