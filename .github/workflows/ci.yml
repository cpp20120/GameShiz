name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
      - feature/**
      - meta-**
      - agent/**

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply staged Discord UX patch
        if: hashFiles('.github/discord-ux.patch.gz.b64') != ''
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/discord-ux.patch.gz.b64 | gzip -d > /tmp/discord-ux.patch
          git apply --index /tmp/discord-ux.patch
          git rm .github/discord-ux.patch.gz.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add Discord interaction UX layer"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Validate microservices Compose topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          CLICKHOUSE_PASSWORD: ci-clickhouse-password
          GRAFANA_ADMIN_PASSWORD: ci-grafana-password
        run: |
          cp .env.example .env
          docker compose --profile microservices config --quiet

      - name: Publish source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build --no-restore --configuration Release 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dotnet test --no-build --configuration Release --verbosity normal 2>&1 | tee test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 1
