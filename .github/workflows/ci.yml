name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
      - feature/**
      - meta-**

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate microservices Compose topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          CLICKHOUSE_PASSWORD: ci-clickhouse-password
          GRAFANA_ADMIN_PASSWORD: ci-grafana-password
        run: |
          cp .env.example .env
          docker compose --profile microservices config --quiet

      - name: Publish source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build --no-restore --configuration Release 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dotnet test --no-build --configuration Release --verbosity normal 2>&1 | tee test.log

      - name: Verify public API and breaking route
        run: bash eng/verify-public-api.sh

      - name: Verify generated BotFramework client
        run: dotnet build framework/BotFramework.Client/BotFramework.Client.csproj --no-restore --configuration Release -p:BotFrameworkGenerateClient=true

      - name: Validate Prometheus alert rules
        run: docker run --rm -v "$PWD:/work:ro" prom/prometheus:v2.55.1 promtool check rules /work/prometheus/alerts/botframework.rules.yml

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: |
          helm lint deploy/helm/cazinoshiz
          helm template cazinoshiz deploy/helm/cazinoshiz > helm-rendered.yaml


      - name: Package consumer smoke test
        run: bash eng/package-consumer-smoke.sh

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 1
