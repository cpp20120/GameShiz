name: Publish BotFramework

on:
  push:
    tags:
      - framework-v*

permissions:
  contents: write

jobs:
  publish:
    name: Pack and publish framework
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#framework-v}"
          if [[ "$tag" == "$version" ]]; then
            echo "Unexpected framework release tag: $tag" >&2
            exit 2
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid framework release version: $version" >&2
            exit 2
          fi
          echo "FRAMEWORK_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: preview

      - name: Validate release notes
        run: test -f "docs/releases/$FRAMEWORK_VERSION.md"

      - name: Restore
        run: dotnet restore CasinoShiz.slnx

      - name: Build
        run: dotnet build CasinoShiz.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test CasinoShiz.slnx --no-build --configuration Release --verbosity normal

      - name: Verify public API
        run: bash eng/verify-public-api.sh

      - name: Verify package consumers
        run: bash eng/package-consumer-smoke.sh

      - name: Pack release artifacts
        run: bash eng/pack-framework.sh "$FRAMEWORK_VERSION" "$RUNNER_TEMP/framework-release"
        env:
          SKIP_RESTORE: "1"

      - name: Publish packages to NuGet
        shell: bash
        run: |
          test -n "$NUGET_API_KEY"
          for package in "$RUNNER_TEMP"/framework-release/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes="docs/releases/$FRAMEWORK_VERSION.md"
          gh release create "$GITHUB_REF_NAME" \
            "$RUNNER_TEMP"/framework-release/*.nupkg \
            --verify-tag \
            --title "BotFramework $FRAMEWORK_VERSION" \
            --notes-file "$notes"
