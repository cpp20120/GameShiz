{{- if .Values.bff.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-bff
  labels:
    app.kubernetes.io/component: admin-bff
    {{- include "cazinoshiz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bff.admin.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/component: admin-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: admin-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: admin-bff
          image: {{ .Values.images.adminBff }}
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - name: Services__Backend__Address
              value: http://game-admin:8080
            - name: Services__Backend__GrpcAddress
              value: http://game-admin:8081
            - name: Services__Identity__Address
              value: http://identity:8081
            - name: Services__Wallet__Address
              value: http://wallet:8081
            - name: Services__Operations__ApiKey
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.operationsApiKeyKey }} } }
            - name: Admin__SuperAdminToken
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.adminSuperAdminTokenKey }} } }
          readinessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: admin-bff }
spec:
  selector: { app.kubernetes.io/component: admin-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ name: http, port: 8080, targetPort: http }]
{{- end }}
