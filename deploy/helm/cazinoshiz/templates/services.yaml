{{- $root := . }}
{{- range $name, $component := dict "identity" .Values.identity "wallet" .Values.wallet }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/component: {{ $name }}
    {{- include "cazinoshiz.labels" $root | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: {{ $name }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8081
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/component: {{ $name }}
    {{- include "cazinoshiz.labels" $root | nindent 4 }}
spec:
  replicas: {{ $component.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ $name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ if eq $name "identity" }}{{ $root.Values.images.identity }}{{ else }}{{ $root.Values.images.wallet }}{{ end }}
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cazinoshiz.secret" $root }}
                  key: {{ $root.Values.secrets.postgresPasswordKey }}
            - name: ConnectionStrings__Postgres
              value: Host={{ $name }}-postgres;Port=5432;Database={{ $name }};Username={{ $name }};Password=$(POSTGRES_PASSWORD)
            - name: Redis__Enabled
              value: "false"
            - name: ClickHouse__Enabled
              value: "false"
            - name: Bot__Enabled
              value: "false"
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            periodSeconds: 10
---
{{- end }}
