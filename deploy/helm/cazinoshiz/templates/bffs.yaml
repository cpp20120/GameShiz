{{- $root := . }}
{{- if .Values.bff.telegram.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bff
  labels:
    app.kubernetes.io/component: telegram-bff
    {{- include "cazinoshiz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bff.telegram.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/component: telegram-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: telegram-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: telegram-bff
          image: {{ .Values.images.telegramBff }}
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.postgresPasswordKey }} } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.redisPasswordKey }} } }
            - name: Backend__GrpcAddress
              value: http://game-admin:8081
            {{- range $name, $game := .Values.games }}
            - name: Backend__GameAddresses__{{ $game.routeKey }}
              value: http://game-{{ $name }}:8081
            {{- end }}
            - name: Services__Identity__Address
              value: http://identity:8081
            - name: Services__Wallet__Address
              value: http://wallet:8081
            - name: Bot__Enabled
              value: "true"
            - name: Bot__Token
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.telegramTokenKey }} } }
            - name: ConnectionStrings__Postgres
              value: Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=$(POSTGRES_PASSWORD)
            - name: Redis__ConnectionString
              value: {{ .Values.redis.address }},password=$(REDIS_PASSWORD)
          readinessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: telegram-bff }
spec:
  selector: { app.kubernetes.io/component: telegram-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
{{- end }}
{{- if .Values.bff.discord.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bff
  labels:
    app.kubernetes.io/component: discord-bff
    {{- include "cazinoshiz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bff.discord.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/component: discord-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: discord-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: discord-bff
          image: {{ .Values.images.discordBff }}
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.postgresPasswordKey }} } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.redisPasswordKey }} } }
            - name: Backend__GrpcAddress
              value: http://game-admin:8081
            {{- range $name, $game := .Values.games }}
            - name: Backend__GameAddresses__{{ $game.routeKey }}
              value: http://game-{{ $name }}:8081
            {{- end }}
            - name: Services__Identity__Address
              value: http://identity:8081
            - name: Services__Wallet__Address
              value: http://wallet:8081
            - name: ConnectionStrings__Postgres
              value: Host=backend-postgres;Port=5432;Database=backend;Username=backend;Password=$(POSTGRES_PASSWORD)
            - name: Redis__ConnectionString
              value: {{ .Values.redis.address }},password=$(REDIS_PASSWORD)
            - name: Discord__Enabled
              value: "true"
            - name: Discord__Token
              valueFrom: { secretKeyRef: { name: {{ include "cazinoshiz.secret" . }}, key: {{ .Values.secrets.discordTokenKey }} } }
          readinessProbe: { httpGet: { path: /health/ready, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: discord-bff }
spec:
  selector: { app.kubernetes.io/component: discord-bff, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
{{- end }}
