{{- if .Values.bff.rest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api
  labels:
    app.kubernetes.io/component: rest-api
    {{- include "cazinoshiz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bff.rest.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/component: rest-api, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: rest-api, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: rest-api
          image: {{ .Values.images.restApi }}
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - name: Backend__GrpcAddress
              value: http://game-admin:8081
            {{- range $name, $game := .Values.games }}
            - name: Backend__GameAddresses__{{ $game.routeKey }}
              value: http://game-{{ $name }}:8081
            {{- end }}
            - name: Rest__Jwt__Authority
              value: {{ .Values.rest.jwt.authority | quote }}
            - name: Rest__Jwt__Audience
              value: {{ .Values.rest.jwt.audience | quote }}
            - name: Rest__Jwt__RequireHttpsMetadata
              value: {{ .Values.rest.jwt.requireHttpsMetadata | quote }}
          readinessProbe: { httpGet: { path: /health/ready, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: rest-api }
spec:
  selector: { app.kubernetes.io/component: rest-api, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ name: http, port: 8080, targetPort: http }]
{{- end }}
