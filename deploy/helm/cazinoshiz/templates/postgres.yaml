{{- range $name, $db := .Values.databases }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-postgres
  labels:
    app.kubernetes.io/component: {{ $name }}-postgres
    {{- include "cazinoshiz.labels" $ | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: {{ $name }}-postgres
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}-postgres
  labels:
    app.kubernetes.io/component: {{ $name }}-postgres
    {{- include "cazinoshiz.labels" $ | nindent 4 }}
spec:
  serviceName: {{ $name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $name }}-postgres
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ $name }}-postgres
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ $db.database | quote }}
            - name: POSTGRES_USER
              value: {{ $db.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cazinoshiz.secret" $ }}
                  key: {{ $.Values.secrets.postgresPasswordKey }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ $db.storage }}
---
{{- end }}
